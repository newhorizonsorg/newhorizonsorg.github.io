<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <title>NEW HORIZONS</title>
    <style>
        :root {
            --bg: #020608;
            --ink: #33ffcc;
            --accent: #ff9933;
            --border-alpha: rgba(51, 255, 204, 0.25);
            --glow: 0 0 8px rgba(51, 255, 204, 0.6), 0 0 2px rgba(255, 255, 255, 0.8);
            --crt-curvature: 3px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: "SF Mono", "Monaco", "Inconsolata", "Fira Code", monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            letter-spacing: -0.02em;
            text-shadow: var(--glow);
            animation: crt-flicker 0.15s infinite;
            transition: background 2s ease-in-out;
            cursor: crosshair;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.15;
            pointer-events: none;
            z-index: 99;
            animation: static-noise 0.4s infinite steps(5);
        }

        .crt-vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 98;
        }

        .terminal-container {
            width: 85%;
            max-width: 1000px;
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            border: 2px solid var(--ink);
            background: rgba(2, 6, 8, 0.85);
            box-shadow: 0 0 20px rgba(51, 255, 204, 0.15), inset 0 0 30px rgba(0, 0, 0, 0.8);
            border-radius: var(--crt-curvature);
            position: relative;
            z-index: 10;
        }

        .worldline-zero {
            --bg: #050505;
            animation: phase-shift 4s ease-in-out forwards !important;
        }

        .found-text {
            animation: glow-up 10s ease-in-out forwards, strobe-flicker 0.2s infinite alternate;
        }

        .copyright-strobe {
            animation: strobe-flicker 0.3s infinite alternate;
        }

        @keyframes glow-up {
            0% { color: #111; text-shadow: 0 0 0px transparent; }
            100% { color: #ffffff; text-shadow: 0 0 15px rgba(255,255,255,0.7), 0 0 5px rgba(255,255,255,0.5); }
        }

        @keyframes strobe-flicker {
            0% { opacity: 0.8; filter: blur(0px); }
            20% { opacity: 1; filter: blur(0.5px); }
            40% { opacity: 0.9; }
            60% { opacity: 1; filter: blur(0px); }
            80% { opacity: 0.8; }
            100% { opacity: 1; filter: contrast(1.5); }
        }

        @keyframes phase-shift {
            0% { filter: invert(1) brightness(2); }
            10% { filter: contrast(2) grayscale(1); }
            100% { filter: contrast(1.1) grayscale(1); }
        }

        .row { padding: 1.5rem 2rem; border-bottom: 2px solid var(--ink); position: relative; }
        .header-row { display: flex; justify-content: space-between; background: var(--ink); color: var(--bg); font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .brand-row { display: flex; justify-content: space-between; align-items: flex-end; background: repeating-linear-gradient(45deg, rgba(51, 255, 204, 0.02), rgba(51, 255, 204, 0.02) 10px, transparent 10px, transparent 20px); }
        .org-name h1 { font-size: 2.2rem; font-weight: 800; line-height: 1; text-transform: uppercase; letter-spacing: 0.1em; animation: text-glitch 4s infinite; }
        .org-name span { display: block; font-size: 1rem; margin-bottom: 0.5rem; color: var(--accent); }
        .mission-id { font-size: 0.65rem; text-align: right; line-height: 1.6; border-left: 2px dotted var(--border-alpha); padding-left: 1rem; }
        .countdown-row { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: none; padding: 4rem 2rem; background: rgba(0, 0, 0, 0.4); }
        .cell { display: flex; flex-direction: column; border-right: 2px dashed var(--border-alpha); padding-left: 1.5rem; align-items: center; }
        .val { font-size: 6rem; font-weight: 400; color: #fff; text-shadow: 0 0 15px var(--ink); }
        .label { font-size: 0.6rem; text-transform: uppercase; margin-top: 1rem; color: var(--accent); background: rgba(255, 153, 51, 0.1); padding: 0.2rem 0.5rem; border: 1px solid rgba(255, 153, 51, 0.3); }
        .footer-row { border-top: 2px solid var(--ink); display: flex; justify-content: space-between; font-size: 0.6rem; background: var(--ink); color: var(--bg); }

        @keyframes crt-flicker { 0% { opacity: 0.98; } 50% { opacity: 0.95; } 100% { opacity: 0.99; } }
        @keyframes static-noise { 0% { transform: translate(0,0); } 100% { transform: translate(-2px, 2px); } }
        @keyframes text-glitch { 0% { text-shadow: var(--glow); } 95% { text-shadow: var(--glow); transform: skew(0deg); } 96% { text-shadow: -2px 0 red, 2px 0 blue; transform: skew(-5deg); } 100% { text-shadow: var(--glow); } }
    </style>
</head>
<body>
    <div class="crt-vignette"></div>

    <div class="terminal-container" id="main-terminal">
        <div class="row header-row">
            <span>welcome, future lab member</span>
            <span>UTC 1000Z 9 JUN</span>
        </div>

        <div class="row brand-row">
            <div class="org-name">
                <span>NEW HORIZONS</span>
                <h1>ニュー・ホライズンズ</h1>
            </div>
            <div class="mission-id">
                Counting down until 2026, 9th June 0500 AM Eastern Standard Time<br>
            </div>
        </div>

        <div class="row countdown-row" id="content-deck">
            <div class="cell"><span class="val" id="days">00</span><span class="label">Days</span></div>
            <div class="cell"><span class="val" id="hours">00</span><span class="label">Hours</span></div>
            <div class="cell"><span class="val" id="minutes">00</span><span class="label">Minutes</span></div>
            <div class="cell"><span class="val" id="seconds">00</span><span class="label">Seconds</span></div>
        </div>

        <div class="row footer-row">
            <span>&copy; ２０２６ ニュー・ホライズンズ。</span>
            <span class="glitch-static">SCIENCE IS THE GRANDEST ADVENTURE OF HUMAN CURIOSITY. KNOWLEDGE SHOULD BE DRIVEN BY WONDER, NOT PROFIT.</span>
        </div>
    </div>

    <script>
const target = new Date(Date.UTC(2026, 5, 9, 10, 0, 0)).getTime();
    let timerInterval;
    
    // --- AUDIO CONFIGURATION ---
    // Offset 0 = starts exactly when minutes hit 00. 
    // +1 = 1 second after minutes hit 00.
    const offset1 = 16; 

    const audio1 = new Audio('congratulations2.mp3');
    let audio1Triggered = false;
    // ---------------------------

    const update = () => {
        const now = new Date().getTime();
        const diff = target - now;
        
        // Calculate total seconds remaining
        const totalSecondsRemaining = Math.floor(diff / 1000);
        const minutesRemaining = Math.floor(totalSecondsRemaining / 60);

        // Logic triggers only when Minutes = 00
        if (minutesRemaining === 0 && totalSecondsRemaining > 0) {
            
            // Current second within the final minute (0 to 59)
            const secondsIntoFinalMinute = 60 - totalSecondsRemaining;

            if (secondsIntoFinalMinute >= offset1 && !audio1Triggered) {
                audio1.play().catch(e => console.log("Interaction required for audio"));
                audio1Triggered = true;
            }
        }

        if (diff <= 0) {
            clearInterval(timerInterval);
            const container = document.getElementById("main-terminal");
            document.body.style.backgroundColor = "#000";
            container.classList.add("worldline-zero");
            container.innerHTML = `
                <div class="row header-row" style="background: #111; border-bottom: 2px solid #222; box-shadow: none;">
                    <span class="found-text">WELCOME TO YEAR 0 OF NEW HORIZONS</span>
                    <span class="found-text">THE CALENDAR HAS BEEN RESET</span>
                </div>
                <div style="padding: 8rem 2rem; text-align: center; display: flex; flex-direction: column; gap: 1rem; flex-grow: 1; justify-content: center; background: rgba(0,0,0,0.6);">
                    <h1 class="found-text" style="font-size: 2.2rem; font-weight: 100; text-transform: uppercase; letter-spacing: 0.5em; filter: blur(0.5px);">WELCOME TO NEW HORIZONS</h1>
                    <p class="found-text" style="font-size: 0.9rem; letter-spacing: 0.2em; font-style: italic;">The organisation has been founded!</p>
                </div>
                <div class="row footer-row" style="border-top: 2px solid #222; background: #000; opacity: 1;">
                    <span class="copyright-strobe" style="color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.5);">&copy; ２０２６ ニュー・ホライズンズ。</span>
                    <span class="found-text" style="font-style: italic;">INCEPTION: THE ORGANISATION HAS BEEN BORN ON YOON 0</span>
                </div>`;
            return;
        }

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = String(d).padStart(2, '0');
        document.getElementById("hours").innerText = String(h).padStart(2, '0');
        document.getElementById("minutes").innerText = String(m).padStart(2, '0');
        document.getElementById("seconds").innerText = String(s).padStart(2, '0');
    };

    timerInterval = setInterval(update, 1000);
    update();
    </script>
</body>
</html>
